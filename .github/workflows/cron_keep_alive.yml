name: Manter Streamlit Ativo

on:
  schedule:
    # Pinga a cada 25 minutos para evitar hibernação (Streamlit hiberna em ~5 min de inatividade)
    # GitHub Actions gratuito: ~2000 min/mês. 25min = ~2.880 execuções/mês × ~10s = ~480 min/mês. OK.
    - cron: '*/25 * * * *'
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          URL="https://pbic-avaliacao.streamlit.app/"
          echo "Pingando: $URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "App respondeu com sucesso."
          else
            echo "ATENCAO: App retornou status $HTTP_CODE"
          fi
